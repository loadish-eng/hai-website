[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: send all routes to index.html so client-side routing
# (react-router) handles them.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
