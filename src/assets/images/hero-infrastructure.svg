<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0d0f0c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgGrad)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <ellipse cx="1150" cy="320" rx="500" ry="380" fill="url(#glow)"/>

  <!-- Server rack silhouettes -->
  <g opacity="0.9">
    <g transform="translate(820,260)">
      <rect width="220" height="520" rx="6" fill="#101210" stroke="#262b26" stroke-width="2"/>
      <g stroke="#39ff14" stroke-width="1" opacity="0.55">
        <line x1="20" y1="40" x2="200" y2="40"/>
        <line x1="20" y1="90" x2="200" y2="90"/>
        <line x1="20" y1="140" x2="200" y2="140"/>
        <line x1="20" y1="190" x2="200" y2="190"/>
        <line x1="20" y1="240" x2="200" y2="240"/>
        <line x1="20" y1="290" x2="200" y2="290"/>
        <line x1="20" y1="340" x2="200" y2="340"/>
        <line x1="20" y1="390" x2="200" y2="390"/>
        <line x1="20" y1="440" x2="200" y2="440"/>
        <line x1="20" y1="490" x2="200" y2="490"/>
      </g>
      <circle cx="35" cy="40" r="4" fill="#39ff14"/>
      <circle cx="35" cy="140" r="4" fill="#39ff14"/>
      <circle cx="35" cy="290" r="4" fill="#ff8a3d"/>
      <circle cx="35" cy="440" r="4" fill="#39ff14"/>
    </g>
    <g transform="translate(1080,180)">
      <rect width="260" height="600" rx="6" fill="#0c0e0c" stroke="#262b26" stroke-width="2"/>
      <g stroke="#39ff14" stroke-width="1" opacity="0.4">
        <line x1="24" y1="50" x2="236" y2="50"/>
        <line x1="24" y1="100" x2="236" y2="100"/>
        <line x1="24" y1="150" x2="236" y2="150"/>
        <line x1="24" y1="200" x2="236" y2="200"/>
        <line x1="24" y1="250" x2="236" y2="250"/>
        <line x1="24" y1="300" x2="236" y2="300"/>
        <line x1="24" y1="350" x2="236" y2="350"/>
        <line x1="24" y1="400" x2="236" y2="400"/>
        <line x1="24" y1="450" x2="236" y2="450"/>
        <line x1="24" y1="500" x2="236" y2="500"/>
        <line x1="24" y1="550" x2="236" y2="550"/>
      </g>
      <circle cx="40" cy="50" r="4" fill="#39ff14"/>
      <circle cx="40" cy="200" r="4" fill="#39ff14"/>
      <circle cx="40" cy="350" r="4" fill="#39ff14"/>
      <circle cx="40" cy="500" r="4" fill="#ff8a3d"/>
    </g>
  </g>

  <!-- circuit traces -->
  <g stroke="#39ff14" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M0 700 H400 L450 650 H700"/>
    <path d="M0 780 H300 L340 820 H650 L700 780 H1000"/>
    <circle cx="700" cy="650" r="4" fill="#39ff14"/>
    <circle cx="650" cy="820" r="4" fill="#39ff14"/>
  </g>
</svg>
