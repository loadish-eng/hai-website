<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="aboutBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080a08"/>
      <stop offset="100%" stop-color="#0f120f"/>
    </linearGradient>
    <pattern id="aboutGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#181c18" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1000" height="800" fill="url(#aboutBg)"/>
  <rect width="1000" height="800" fill="url(#aboutGrid)"/>

  <g transform="translate(250,180)" opacity="0.95">
    <rect width="500" height="440" rx="14" fill="#0e110e" stroke="#262b26" stroke-width="2"/>
    <g stroke="#39ff14" stroke-width="1" opacity="0.45">
      <line x1="40" y1="60" x2="460" y2="60"/>
      <line x1="40" y1="110" x2="460" y2="110"/>
      <line x1="40" y1="160" x2="460" y2="160"/>
      <line x1="40" y1="210" x2="460" y2="210"/>
      <line x1="40" y1="260" x2="460" y2="260"/>
      <line x1="40" y1="310" x2="460" y2="310"/>
      <line x1="40" y1="360" x2="460" y2="360"/>
    </g>
    <circle cx="65" cy="60" r="5" fill="#39ff14"/>
    <circle cx="65" cy="160" r="5" fill="#ff8a3d"/>
    <circle cx="65" cy="260" r="5" fill="#39ff14"/>
    <circle cx="65" cy="360" r="5" fill="#39ff14"/>
  </g>

  <g stroke="#39ff14" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M0 400 H250"/>
    <path d="M750 400 H1000"/>
    <circle cx="250" cy="400" r="4" fill="#39ff14"/>
    <circle cx="750" cy="400" r="4" fill="#39ff14"/>
  </g>
</svg>
